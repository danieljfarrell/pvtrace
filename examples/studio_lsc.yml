version: "1.0"

nodes:
  world:
    sphere:
      radius: 12.0
      material:
        refractive-index: 1.0

  lsc:
    parent: world
    location: [0, 0, 0.5]
    # One line instruments the object: every face gets an escaping
    # recorder with a position heatmap, plus a volume loss recorder.
    record: true
    box:
      size: [5, 5, 1]
      material:
        refractive-index: 1.5
        components:
          - my-lumogen-dye
          - background

  green-laser:
    parent: world
    location: [0, 0, 3.0]
    direction: [0, 0, -1]
    light:
      wavelength: 555
      mask:
        direction:
          cone:
            half-angle: 22.5

components:
  my-lumogen-dye:
    luminophore:
      absorption:
        coefficient: 5
        spectrum:
          name: lumogen-f-red-305
          range:
            min: 500
            max: 1000
            spacing: 2
      emission:
        quantum-yield: 0.95
        phase-function: "isotropic"
        spectrum:
          name: lumogen-f-red-305
          range:
            min: 500
            max: 1000
            spacing: 2

  background:
    absorber:
      coefficient: 0.05

# Explicit recorders can be added alongside (or override) the automatic
# ones from `record: true`. This one adds angle and time-of-flight
# statistics to the east edge.
recorders:
  edge-escape:
    node: lsc
    event: escaping
    facet: [1, 0, 0]
    histograms:
      wavelength: [500, 900, 80]
      angle: [0, 1.5708, 18]
      duration: [0, 1.0e-9, 60]
