<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>pvtrace studio</title>
<link rel="stylesheet" href="/static/vendor/codemirror.min.css">
<link rel="stylesheet" href="/static/vendor/codemirror-material-darker.min.css">
<link rel="stylesheet" href="/static/app.css">
<script src="/static/vendor/codemirror.min.js"></script>
<script src="/static/vendor/codemirror-yaml.min.js"></script>
<script type="importmap">
{ "imports": { "three": "/static/vendor/three.module.js" } }
</script>
</head>
<body>
<header>
  <h1>pvtrace <span>studio</span></h1>
  <div id="status" class="ok">ready</div>
</header>
<main>
  <section id="editor-pane">
    <div class="pane-title">Scene document
      <label class="toggle"><input type="checkbox" id="reactive"> reactive</label>
      <label class="toggle"><input type="checkbox" id="realtime"> real&nbsp;time</label>
    </div>
    <textarea id="editor" spellcheck="false"></textarea>
    <div class="row">
      <button id="apply">Apply</button>
      <button id="save" title="Write the document back to the file">Save</button>
      <div id="doc-status"></div>
    </div>
  </section>

  <section id="view-pane">
    <div id="viewport"></div>
    <div id="toolbar">
      <button data-add="box" title="Add box">+ box</button>
      <button data-add="sphere" title="Add sphere">+ sphere</button>
      <button data-add="cylinder" title="Add cylinder">+ cylinder</button>
      <button data-add="light" title="Add light">+ light</button>
    </div>
    <div id="inspector">
      <div class="inspector-head">
        <b id="inspector-name">View</b>
        <button id="inspector-close" title="Deselect">×</button>
      </div>
      <div id="inspector-fields"></div>
      <div class="inspector-actions" id="inspector-actions"></div>
    </div>
    <div class="run-bar">
      <label title="Total number of rays to trace. Recorders tally every ray.">rays <input type="text" id="rays" value="500000" size="8" title="Total number of rays to trace. Recorders tally every ray."></label>
      <label title="Keep one complete ray path (for the 3D view) every n rays. Higher = fewer paths drawn.">paths <input type="text" id="record-every" value="500" size="5" title="Keep one complete ray path (for the 3D view) every n rays. Higher = fewer paths drawn."></label>
      <button id="run" class="primary">Run</button>
      <button id="stop">Stop</button>
      <div class="progress"><div id="progress-fill"></div></div>
      <div id="run-status"></div>
    </div>
  </section>

  <section id="results-pane">
    <div class="pane-title">Recorders</div>
    <div id="recorders"></div>
    <div id="bin-info" hidden></div>
  </section>
</main>
<script type="module" src="/static/app.js"></script>
</body>
</html>
