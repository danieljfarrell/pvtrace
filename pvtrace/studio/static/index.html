<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>pvtrace studio</title>
<link rel="stylesheet" href="/static/vendor/codemirror.min.css">
<link rel="stylesheet" href="/static/vendor/codemirror-material-darker.min.css">
<link rel="stylesheet" href="/static/app.css">
<script src="/static/vendor/codemirror.min.js"></script>
<script src="/static/vendor/codemirror-yaml.min.js"></script>
<script type="importmap">
{ "imports": { "three": "/static/vendor/three.module.js" } }
</script>
</head>
<body>
<header>
  <h1>pvtrace <span>studio</span></h1>
  <button id="doc-toggle" title="Show or hide the scene document">document</button>
  <label class="toggle"><input type="checkbox" id="reactive"> reactive</label>
  <label class="toggle"><input type="checkbox" id="realtime"> real&nbsp;time</label>
  <div id="status" class="ok">ready</div>
</header>
<main>
  <section id="editor-pane">
    <div class="pane-title">Scene document</div>
    <textarea id="editor" spellcheck="false"></textarea>
    <div class="row">
      <button id="apply">Apply</button>
      <button id="save" title="Write the document back to the file">Save</button>
      <div id="doc-status"></div>
    </div>
  </section>

  <section id="view-pane">
    <div id="viewport"></div>
    <div id="layerbar">
      <select id="layer-event" title="Which recorder layer is painted on the scene">
        <option value="all">all layers</option>
        <option value="escaping" selected>escaping</option>
        <option value="entering">entering</option>
        <option value="reflected">reflected</option>
        <option value="lost">lost</option>
        <option value="exit">exit</option>
      </select>
      <input id="isolate" list="node-list" placeholder="isolate object…"
             title="Focus one object; everything else is ghosted">
      <datalist id="node-list"></datalist>
    </div>
    <div class="run-bar">
      <label title="Total number of rays to trace. Recorders tally every ray.">rays <input type="text" id="rays" value="500000" size="8"></label>
      <label title="Keep one complete ray path (for the 3D view) every n rays.">paths <input type="text" id="record-every" value="500" size="5"></label>
      <button id="run" class="primary">Run</button>
      <button id="stop">Stop</button>
      <div class="progress"><div id="progress-fill"></div></div>
      <div id="run-status"></div>
    </div>
  </section>

  <section id="inspector-pane">
    <div id="segments">
      <button data-segment="nodes">Nodes</button>
      <button data-segment="components">Components</button>
      <button data-segment="recorders">Recorders</button>
      <button data-segment="view">View</button>
    </div>
    <div id="item-row">
      <select id="item-select"></select>
      <button id="item-add" title="Add a new item to this section">+</button>
    </div>
    <div id="inspector-fields"></div>
    <div class="inspector-actions" id="inspector-actions"></div>
    <div id="bin-info" hidden></div>
  </section>
</main>
<script type="module" src="/static/app.js"></script>
</body>
</html>
